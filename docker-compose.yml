services:
  mysql-db:
    image: mysql:8.0
    # command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: St8z1kt8.0711
      MYSQL_DATABASE: db_ambulatorio
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
    # Adicione este bloco de saúde:
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSt8z1kt8.0711" ]
      interval: 10s # Testa a cada 10 segundos
      timeout: 5s # Espera 5 segundos pela resposta
      retries: 10 # Tenta até 10 vezes (100 segundos no total)
      start_period: 40s # Dá 40 segundos de "imunidade" inicial para o MySQL ligar com calma

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      mysql-db:
        condition: service_healthy # O backend só começa se o MySQL estiver saudável

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
