version: '3.8'

services:
  # 1. O Banco de Dados (MySQL)
  mysql-db:
    image: mysql:8.0
    environment:
      # Usando a mesma senha e banco do seu .env!
      MYSQL_ROOT_PASSWORD: St8z1kt8.0711
      MYSQL_DATABASE: db_ambulatorio
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. A API (Back-end)
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    # Aqui dizemos pro docker pegar o seu arquivo .env
    env_file:
      - ./backend/.env
    depends_on:
      - mysql-db

  # 3. A Interface (Front-end)
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
