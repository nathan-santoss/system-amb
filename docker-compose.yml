services:
  mysql-db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: St8z1kt8.0711
      MYSQL_DATABASE: db_ambulatorio
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    # Adicione este bloco de saúde:
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      mysql-db:
        condition: service_healthy # O backend só começa se o MySQL estiver saudável

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
